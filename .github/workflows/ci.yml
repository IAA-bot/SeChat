name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Format check (ktlint)
        run: ./gradlew ktlintCheck --build-cache --parallel

      - name: Static analysis (detekt + lint)
        run: |
          ./gradlew detekt lint --build-cache --parallel

      - name: Build + test
        run: |
          ./gradlew assembleDebug testDebugUnitTest --build-cache --parallel
