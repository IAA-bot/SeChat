name: Release

on:
  push:
    tags:
      - "v*.*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "Signing APK with release keystore..."
          # Keystore should be stored as GitHub Secrets:
          # KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks
            cp /tmp/keystore.jsk app/sechat-release.jks 2>/dev/null || true
            # Rebuild with signing
            ./gradlew assembleRelease
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SeChat ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
